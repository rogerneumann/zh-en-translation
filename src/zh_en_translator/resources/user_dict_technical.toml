# ---------------------------------------------------------------------------
# Single-character terms — explicit hints for manufacturing disambiguation
# ---------------------------------------------------------------------------

[[terms]]
zh   = "换"
en   = ["replace", "swap out", "change"]
freq = 8
pos  = "v"
note = "In manufacturing: 换 means replace a component, not general 'change'."

[[terms]]
zh   = "标"
en   = ["calibrate", "mark", "label"]
freq = 8
pos  = "v"
note = "Short for 标定 (calibrate) or 标注 (annotate). Context determines meaning."

[[terms]]
zh   = "水路"
en   = ["water line", "water channel", "water circuit"]
freq = 15
pos  = "n"
note = "Fluid/coolant line in a machine or facility. Would be split as 水+路 by default."

[[terms]]
zh   = "拆机"
en   = ["disassemble the unit", "take apart the machine"]
freq = 15
pos  = "v"
note = "Disassemble a machine or device. Distinguish from bare 拆 (remove a component)."

[[terms]]
zh   = "点检"
en   = ["routine inspection", "inspection check", "spot check"]
freq = 12
pos  = "v"
note = "Formal scheduled inspection, typically as part of maintenance procedure."

[[terms]]
zh   = "堵塞"
en   = ["blockage", "clog", "obstruction"]
freq = 12
pos  = "n"
note = "Blockage in a line, pipe, or channel."

[[terms]]
zh   = "疏通"
en   = ["clear", "unblock", "flush out"]
freq = 12
pos  = "v"
note = "Clear a blockage — often paired with 水路 (unblock a water line)."

[[terms]]
zh   = "检修"
en   = ["service", "overhaul", "maintenance inspection"]
freq = 12
pos  = "v"
note = "Scheduled service or overhaul — more thorough than 点检."

[[terms]]
zh   = "维修"
en   = ["repair", "maintenance", "fix"]
freq = 12
pos  = "v"

[[terms]]
zh   = "保养"
en   = ["preventive maintenance", "upkeep", "service"]
freq = 12
pos  = "v"
note = "Scheduled preventive maintenance, not breakdown repair."

[[terms]]
zh   = "停机"
en   = ["downtime", "machine stop", "halt production"]
freq = 12
pos  = "v"
note = "Machine or line stoppage, planned or unplanned."

[[terms]]
zh   = "报修"
en   = ["report for repair", "submit a repair request"]
freq = 12
pos  = "v"

[[terms]]
zh   = "备件"
