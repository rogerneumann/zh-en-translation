# Technical/manufacturing domain dictionary — source of truth for jieba user dict.
#
# This TOML file documents each term with its English translation(s) and usage
# context. The companion user_dict_technical.txt (jieba format) is the file
# actually loaded at runtime; keep both in sync when adding new terms.
#
# Format of each entry:
#   [[terms]]
#   zh     = "Chinese word"
#   en     = ["primary translation", "alt translation"]
#   freq   = <jieba frequency weight (higher = preferred segmentation)>
#   pos    = "<jieba POS tag: n=noun, v=verb, r=pronoun>"
#   note   = "Usage / disambiguation context"

# ---------------------------------------------------------------------------
# Multi-character compounds — highest priority; must not be split by jieba
# ---------------------------------------------------------------------------

[[terms]]
zh   = "激光模块"
en   = ["laser module"]
freq = 20
pos  = "n"
note = "Complete compound: diode/CO₂ laser assembly unit. Never split into 激光 + 模块 in manufacturing context."

[[terms]]
zh   = "手板样机"
en   = ["prototype", "sample machine", "pre-production prototype"]
freq = 20
pos  = "n"
note = "Physical prototype built before mass production (手板 = hand-made board, 样机 = sample unit)."

[[terms]]
zh   = "激光头模块"
en   = ["laser head module", "laser head assembly"]
freq = 20
pos  = "n"
note = "Complete laser head + driver board assembly."

[[terms]]
zh   = "拆机点检"
en   = ["disassemble and inspect", "teardown inspection"]
freq = 20
pos  = "v"
note = "Compound maintenance procedure: disassemble the unit then perform a formal inspection check. Must not be split."

[[terms]]
zh   = "功能异常"
en   = ["functional abnormality", "functional fault", "abnormal function"]
freq = 15
pos  = "n"
note = "Describes a unit whose functions are not operating normally. Keep as compound."

[[terms]]
zh   = "进能部门"
en   = ["calibration department", "testing department", "energy input department"]
freq = 15
pos  = "n"
note = "Internal department name; 进能 can mean 'energy input' or 'calibration' in factory context."

